version: 2.1

executors:
  ruby:
    parameters:
      version:
        type: string
    docker:
      - image: rubylang/ruby:<< parameters.version >>-dev-noble
    working_directory: /root/saml_idp_metadata

commands:
  install_system_dependencies:
    description: "Install system dependencies"
    steps:
      - run:
          name: Install System Dependencies
          # https://circleci.com/docs/2.0/custom-images/#required-tools-for-primary-containers
          command: apt-get update -y && apt-get install -y ssh

  checkout_code:
    description: "Checkout using the Ed25519 deploy key (Additional SSH Key)"
    steps:
      # Adds all Additional SSH Keys registered for this project to the agent.
      # The Ed25519 deploy key avoids the RSA/SHA-1 issue on the noble image.
      - add_ssh_keys
      - run:
          name: Checkout
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
            git clone --no-checkout git@github.com:tknzk/saml_idp_metadata.git .
            git checkout -f "$CIRCLE_SHA1"

  bundle_gems:
    description: "Bundle gems"
    steps:
      - run:
          name: Bundle gems
          command: |
            gem install bundler -v 2.5.22 --no-document --force
            bundle install

  run_tests:
    description: "Run tests"
    steps:
      - run:
          name: Run tests
          command: |
            bundle exec rake
            bundle exec rubocop
      - store_artifacts:
          path: coverage

jobs:
  test:
    parameters:
      ruby-version:
        type: string
    executor:
      name: ruby
      version: << parameters.ruby-version >>
    steps:
      - install_system_dependencies
      - checkout_code
      - bundle_gems
      - run_tests

workflows:
  version: 2
  test:
    jobs:
      - test:
          matrix:
            parameters:
              ruby-version:
                - "3.3"
                - "3.4"
                - "4.0"
